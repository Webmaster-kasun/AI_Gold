name: CPR Gold Bot V1.1 (DISABLED - Railway is primary runner)

# GitHub Actions is DISABLED - Railway runs this bot 24/7
# Only enable workflow_dispatch if you want to run manually for testing

on:
  workflow_dispatch:   # Manual trigger only - NO automatic schedule

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore persisted state
        uses: actions/cache@v4
        with:
          path: |
            data/trade_history.json
            data/trade_history_archive.json
            data/score_cache.json
            data/runtime_state.json
            data/calendar_cache.json
            data/cpr_gold.db
          key: gold-state-${{ github.run_id }}
          restore-keys: |
            gold-state-

      - name: Run bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATA_DIR:         ${{ github.workspace }}/data
        run: python bot.py

      - name: Save persisted state
        if: always()
        uses: actions/cache@v4
        with:
          path: |
            data/trade_history.json
            data/trade_history_archive.json
            data/score_cache.json
            data/runtime_state.json
            data/calendar_cache.json
            data/cpr_gold.db
          key: gold-state-${{ github.run_id }}
